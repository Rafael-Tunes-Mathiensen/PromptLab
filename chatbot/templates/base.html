{% load static %}
<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}PromptLab{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    {% block extra_head %}{% endblock %}
  </head>
  <body class="page-{{ page_name|default:'app' }}">
    <div class="page-aurora page-aurora-left" aria-hidden="true"></div>
    <div class="page-aurora page-aurora-right" aria-hidden="true"></div>

    <nav class="site-nav">
      <div class="site-nav-inner">
        <a class="brand" href="{% url 'chatbot:landing' %}">
          <span class="brand-logo" aria-hidden="true">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M13 2L4.5 13.5H11L10 22L20.5 10.5H14L13 2Z"
                fill="currentColor"
              />
            </svg>
          </span>
          <span class="brand-name">Prompt<span>Lab</span></span>
        </a>

        <div class="site-nav-links">
          <a
            href="{% url 'chatbot:landing' %}"
            class="site-nav-link {% if page_name == 'landing' %}is-active{% endif %}"
          >
            Inicio
          </a>
          <a
            href="{% url 'chatbot:chat_home' %}"
            class="site-nav-link {% if page_name == 'chat' %}is-active{% endif %}"
          >
            Chats
          </a>
        </div>

        <a class="nav-github" href="{{ github_url }}" target="_blank" rel="noreferrer">
          GitHub
        </a>
      </div>
    </nav>

    <main class="site-main">
      {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
  </body>
</html>
